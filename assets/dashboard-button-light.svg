<svg xmlns="http://www.w3.org/2000/svg" width="640" height="140" viewBox="0 0 640 140">
  <defs>
    <clipPath id="track-clip">
      <rect x="10" y="10" width="620" height="120" rx="60" />
    </clipPath>
  </defs>

  <!-- Outer black border of the track -->
  <rect x="5" y="5" width="630" height="130" rx="65" fill="#000000" />
  <rect x="10" y="10" width="620" height="120" rx="60" fill="#ffffff" />

  <!-- The 5 colorful track spaces perfectly divided -->
  <g clip-path="url(#track-clip)">
    <rect x="-10" y="10" width="134" height="120" fill="#6ca1d8" stroke="#000000" stroke-width="8" />
    <rect x="124" y="10" width="124" height="120" fill="#ee83b3" stroke="#000000" stroke-width="8" />
    <rect x="248" y="10" width="124" height="120" fill="#f6ae00" stroke="#000000" stroke-width="8" />
    <rect x="372" y="10" width="124" height="120" fill="#539912" stroke="#000000" stroke-width="8" />
    <rect x="496" y="10" width="154" height="120" fill="#fd5a10" stroke="#000000" stroke-width="8" />
  </g>

  <!-- Inner center board (White box with black border) -->
  <rect x="50" y="35" width="540" height="70" rx="10" fill="#ffffff" stroke="#000000" stroke-width="8" />

  <!-- Chunky Text -->
  <text x="320" y="81" font-family="'Arial Black', Impact, sans-serif" font-size="26" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="1">VIEW INTERACTIVE DASHBOARD</text>
</svg>
